<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Study Session</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">📚 Smart Study Planner</h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="log-session.html" class="active">Log Session</a></li>
                <li><a href="predictions.html">Predictions</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="card">
            <h2>Log Your Study Session</h2>
            
            <!-- The Form - This collects data -->
            <form id="sessionForm">
                
                <!-- Subject Selection -->
                <div class="form-group">
                    <label for="subject">Subject:</label>
                    <select id="subject" name="subject" required>
                        <option value="">-- Select Subject --</option>
                    </select>
                </div>

                <!-- Start Time -->
                <div class="form-group">
                    <label for="startTime">Start Time:</label>
                    <input type="datetime-local" id="startTime" name="startTime" required>
                </div>

                <!-- End Time -->
                <div class="form-group">
                    <label for="endTime">End Time:</label>
                    <input type="datetime-local" id="endTime" name="endTime" required>
                </div>

                <!-- Focus Rating Slider -->
                <div class="form-group">
                    <label for="focusRating">Focus Level: <span id="focusValue">5</span>/10</label>
                    <input type="range" id="focusRating" name="focusRating" 
                           min="1" max="10" value="5" class="slider">
                    <div class="slider-labels">
                        <span>😴 Low</span>
                        <span>😊 Medium</span>
                        <span>🔥 High</span>
                    </div>
                </div>

                <!-- Optional Notes -->
                <div class="form-group">
                    <label for="notes">Notes (Optional):</label>
                    <textarea id="notes" name="notes" rows="3" 
                              placeholder="Any observations about this session..."></textarea>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary">Save Session</button>
            </form>

            <!-- Success/Error Messages -->
            <div id="message" class="message hidden"></div>
        </div>

        <!-- Recent Sessions Display -->
        <div class="card">
            <h3>Recent Sessions</h3>
            <div id="recentSessions">
                <p class="loading">Loading...</p>
            </div>
        </div>
    </main>

    <!-- JavaScript -->
    <script src="js/app-config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/log-session.js"></script>
</body>
</html>
